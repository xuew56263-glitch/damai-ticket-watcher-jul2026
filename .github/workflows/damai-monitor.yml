name: Damai ticket monitor

on:
  schedule:
    - cron: '3-58/5 * * * *'
  workflow_dispatch:
    inputs:
      run_for_seconds:
        description: Initial verification run duration
        required: false
        default: '19200'

permissions:
  actions: write
  contents: write
  issues: write

concurrency:
  group: damai-ticket-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 345
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm install --omit=dev
      - name: Restore Playwright browser
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - name: Check availability
        run: node src/github-actions-check.js
        env:
          DAMAI_ITEM_URL: https://m.damai.cn/shows/item.html?itemId=1063631004645
          WATCHER_EXPIRES_AT: '2026-07-15T18:00:00+08:00'
          RUN_FOR_SECONDS: ${{ inputs.run_for_seconds || '19200' }}
          POLL_INTERVAL_SECONDS: '20'
          STATUS_FILE: docs/status.json
          LIVE_STATUS_TOKEN: ${{ github.token }}
          LIVE_STATUS_REPOSITORY: ${{ github.repository }}
          LIVE_STATUS_ISSUE_NUMBER: '1'
          LIVE_STATUS_RAW_BRANCH: live-status
          BARK_KEY: ${{ secrets.BARK_KEY }}
          SMS_WEBHOOK_URL: ${{ secrets.SMS_WEBHOOK_URL }}
      - name: Publish phone status
        if: always()
        run: |
          git config user.name 'Damai Monitor'
          git config user.email 'damai-monitor@users.noreply.github.com'
          git add docs/status.json
          git diff --cached --quiet || git commit -m 'Update monitor status'
          git push
      - name: Continue cloud monitoring
        if: always()
        run: node tools/continue-github-monitor.js
        env:
          GITHUB_TOKEN: ${{ github.token }}
          LIVE_STATUS_REPOSITORY: ${{ github.repository }}
          LIVE_STATUS_WORKFLOW: damai-monitor.yml
          LIVE_STATUS_REF: ${{ github.ref_name }}
          WATCHER_EXPIRES_AT: '2026-07-15T18:00:00+08:00'
